version: "2"

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    # correctness
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    # style
    - gocritic
    - revive
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    # complexity
    - gocyclo
    - nestif
    - funlen
    - dupl
    # performance
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    # security & resources
    - gosec
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    # logging
    - sloglint
    - loggercheck
    # testing
    - testifylint
    - thelper
    - usetesting
    - paralleltest
    # modernization & meta
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint

  exclusions:
    rules:
      # Table-driven tests legitimately repeat wire literals and sentinel
      # names; extracting them into constants would hurt test readability.
      - path: _test\.go
        linters:
          - goconst
      # The contract spec scanner reads the repo-local vendored spec at a
      # path supplied by tests — not user input (G304 file inclusion).
      - path: internal/contract/specscan\.go
        text: "G304"
        linters:
          - gosec
      # Tests read repo-local golden fixtures under testdata/ at paths
      # their own registries supply — not user input.
      - path: _test\.go
        text: "G304"
        linters:
          - gosec

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 13
    exhaustive:
      # A default case is a deliberate "everything else" decision.
      default-signifies-exhaustive: true
    godot:
      exclude:
        # The machine-greppable operationId marker (frozen format, no
        # trailing period — the contract doc-line scanner parses it).
        - '^ YNAB operationId: '
    gosec:
      excludes:
        # G404 (math/rand): the only randomness in this library is retry
        # backoff jitter — not a cryptographic use.
        - G404
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      rules:
        # Defaults revive would run without an explicit list, kept active.
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: unexported-return
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
        # The exported-symbol documentation rule (SPEC: every exported symbol
        # documented, enforced from day one).
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

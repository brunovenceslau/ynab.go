version: "2"

run:
  timeout: 5m
  tests: true
  # Tags only add files (smoke_test.go, integration_live_test.go) —
  # without them the tagged files are invisible to every linter.
  build-tags:
    - smoke
    - integration

issues:
  max-issues-per-linter: 0
  max-same-issues: 50

linters:
  enable:
    # correctness
    - govet
    - staticcheck
    - unused
    - errcheck
    - errorlint
    - nilerr
    - forcetypeassert
    - copyloopvar
    - durationcheck
    - reassign
    # style
    - gocritic
    - lll
    - revive
    - whitespace
    - godot
    - misspell
    - dupword
    - predeclared
    - errname
    - asciicheck
    # complexity
    - gocyclo
    - nestif
    - funlen
    - dupl
    # performance
    - perfsprint
    - unconvert
    - ineffassign
    - goconst
    # security & resources
    - gosec
    - bidichk
    - bodyclose
    - noctx
    - containedctx
    - fatcontext
    # logging
    - sloglint
    - loggercheck
    # testing
    - testifylint
    - thelper
    - usetesting
    - paralleltest
    # modernization & meta
    - modernize
    - exptostd
    - intrange
    - usestdlibvars
    - exhaustive
    - nolintlint

  exclusions:
    rules:
      # Table-driven tests legitimately repeat wire literals and sentinel
      # names (goconst), deliberately stay DAMP across services (dupl),
      # and case tables grow past any sane statement budget (funlen).
      - path: _test\.go
        linters:
          - goconst
          - dupl
          - funlen
      # The live suites are sequential BY CONTRACT: one real API, shared
      # rate budget, writes that must never interleave (paralleltest).
      - path: (smoke|integration_live|oauth_live)_test\.go
        linters:
          - paralleltest
      # The contract spec scanner and the ynabtest fake server read
      # repo-local files (vendored spec, golden fixtures) at paths their
      # own tables supply — not user input (G304 file inclusion).
      - path: internal/contract/specscan\.go
        text: "G304"
        linters:
          - gosec
      - path: internal/ynabtest/server\.go
        text: "G304"
        linters:
          - gosec
      # Tests read repo-local golden fixtures under testdata/ at paths
      # their own registries supply — not user input.
      - path: _test\.go
        text: "G304"
        linters:
          - gosec
      # The OAuth live test persists rotated refresh tokens to the file
      # the OPERATOR names via YNAB_OAUTH_TOKEN_FILE — their own
      # credential store, not user input (G703 taint on the env path).
      - path: oauth_live_test\.go
        text: "G703"
        linters:
          - gosec

  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
    funlen:
      lines: 120
      statements: 80
    goconst:
      min-len: 3
      min-occurrences: 4
    gocyclo:
      min-complexity: 13
    exhaustive:
      # A default case is a deliberate "everything else" decision.
      default-signifies-exhaustive: true
    godot:
      exclude:
        # The machine-greppable operationId marker (frozen format, no
        # trailing period — the contract doc-line scanner parses it).
        - '^ YNAB operationId: '
    lll:
      line-length: 120
    gosec:
      excludes:
        # G404 (math/rand): the only randomness in this library is retry
        # backoff jitter — not a cryptographic use.
        - G404
    nolintlint:
      require-explanation: true
      require-specific: true
    thelper:
      tb:
        # ynabtest's helpers accept a nil testing.TB for Example funcs,
        # so tb.Helper() cannot be the unconditional first statement.
        begin: false
    revive:
      rules:
        # Defaults revive would run without an explicit list, kept active.
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code
        - name: unexported-return
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
        # The exported-symbol documentation rule (SPEC: every exported symbol
        # documented, enforced from day one).
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters

formatters:
  enable:
    - gofmt
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true

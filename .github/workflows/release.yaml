# Release gate — runs when a semver tag is pushed. Verifies the tag
# against the baked-in Version constant and the vanity go-import meta
# tag, then re-runs the full local gate suite at the tagged commit.
# Tags are pushed manually and deliberately; this job publishes nothing.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: check version      # local equivalent: scripts/check-version.sh vX.Y.Z
        run: scripts/check-version.sh "$GITHUB_REF_NAME"

      - name: make lint          # local equivalent: make lint
        run: make lint

      - name: make test          # local equivalent: make test
        run: make test

      - name: make contract      # local equivalent: make contract
        run: make contract

      - name: make vulncheck     # local equivalent: make vulncheck
        run: make vulncheck

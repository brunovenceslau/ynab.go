# Release gate — runs when a semver tag is pushed. Verifies the tag
# against the baked-in Version constant and the vanity go-import meta
# tag, then re-runs the full local gate suite at the tagged commit.
# Tags are pushed manually and deliberately; this job publishes nothing.
# Actions are SHA-pinned (tag in the comment); bump deliberately.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x' # latest stable — go.mod's 1.25 floor is the compatibility line, not the tooling line

      - name: check version      # local equivalent: scripts/check-version.sh vX.Y.Z
        run: scripts/check-version.sh "$GITHUB_REF_NAME"

      - name: make lint
        run: make lint

      - name: make test
        run: make test

      - name: make contract
        run: make contract

      - name: make vulncheck
        run: make vulncheck

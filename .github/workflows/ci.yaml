# CI — every step is a make target, so a red step reproduces locally
# with one command (`make local-ci` runs the whole floor leg). The floor
# leg (go.mod's minimum) proves the compatibility promise; the latest
# stable leg runs the full gate suite — tooling always tracks latest.
# Actions are SHA-pinned (tag in the comment); bump deliberately.
name: ci

on:
  push:
    branches: [main, v1]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-tags: true # the apidiff gate needs release tags

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}

      - name: go version
        run: go version

      - name: make vet
        if: matrix.go == '1.25.x'
        run: make vet

      - name: make lint
        if: matrix.go != '1.25.x'
        run: make lint

      - name: make examples
        run: make examples

      - name: make test
        run: make test

      - name: make contract
        run: make contract

      - name: make vulncheck
        if: matrix.go != '1.25.x'
        run: make vulncheck

      - name: make tidy-check
        if: matrix.go != '1.25.x'
        run: make tidy-check

      - name: make actionlint
        if: matrix.go != '1.25.x'
        run: make actionlint

      - name: make apidiff
        if: matrix.go != '1.25.x'
        run: make apidiff

      - name: make check-version-selftest
        if: matrix.go != '1.25.x'
        run: make check-version-selftest

      - name: make coverage
        if: matrix.go != '1.25.x'
        run: make coverage

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.go != '1.25.x'
        with:
          name: coverage
          path: cover.out

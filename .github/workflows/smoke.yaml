# G8's live half — the weekly read-only smoke against the real API.
# Without the YNAB_TEST_TOKEN secret the test self-skips, so the job
# stays green on forks and before the secret exists. The secret is
# scoped to the one step that needs it.
# Actions are SHA-pinned (tag in the comment); bump deliberately.
name: smoke

on:
  schedule:
    - cron: '43 6 * * 1' # weekly, Monday 06:43 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Same matrix as ci — smoke every supported Go against the real
        # API. The suite is read-only, so the legs cannot interfere and
        # need no per-version namespacing.
        go: ['1.25.x', '1.26.x']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go }}

      - name: make smoke
        env:
          YNAB_LIVE_REQUIRED: '1' # a missing secret must fail loud, never skip green
          YNAB_TEST_TOKEN: ${{ secrets.YNAB_TEST_TOKEN }}
        run: make smoke

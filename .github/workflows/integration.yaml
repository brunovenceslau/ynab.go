# The full live-integration suite — every operation against the real
# API, writes create→verify→cleanup on the dedicated test plan, plus
# the OAuth probes. Secrets exist only in this repository's own
# contexts (schedule and workflow_dispatch — never fork PRs), and
# YNAB_LIVE_REQUIRED=1 turns any missing-credential skip into a loud
# failure: live coverage cannot silently erode here.
# Actions are SHA-pinned (tag in the comment); bump deliberately.
name: integration

on:
  schedule:
    - cron: '11 7 * * 1' # weekly, Monday 07:11 UTC — after drift and smoke
  workflow_dispatch:

permissions:
  contents: read

# One live run at a time: overlapping runs race a single OAuth refresh
# chain, and two persist steps can write a dead token into the secrets.
# cancel-in-progress stays false — cancelling mid-refresh is itself a
# stranding hazard.
concurrency:
  group: ynab-live-integration
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'

      - name: make integration
        env:
          YNAB_LIVE_REQUIRED: '1'
          YNAB_TEST_TOKEN: ${{ secrets.YNAB_TEST_TOKEN }}
          YNAB_TEST_PLAN_ID: ${{ secrets.YNAB_TEST_PLAN_ID }}
          YNAB_OAUTH_CLIENT_ID: ${{ secrets.YNAB_OAUTH_CLIENT_ID }}
          YNAB_OAUTH_CLIENT_SECRET: ${{ secrets.YNAB_OAUTH_CLIENT_SECRET }}
          YNAB_OAUTH_REFRESH_TOKEN: ${{ secrets.YNAB_OAUTH_REFRESH_TOKEN }}
          YNAB_OAUTH_RO_REFRESH_TOKEN: ${{ secrets.YNAB_OAUTH_RO_REFRESH_TOKEN }}
          YNAB_OAUTH_TOKEN_FILE: /tmp/ynab_oauth_rotated
        run: |
          umask 077 # the credential file must not be world-readable
          printf 'REFRESH_TOKEN=%s\nRO_REFRESH_TOKEN=%s\n' \
            "$YNAB_OAUTH_REFRESH_TOKEN" "$YNAB_OAUTH_RO_REFRESH_TOKEN" > /tmp/ynab_oauth_rotated
          make integration

      # YNAB invalidates refresh-token ancestors once the chain advances
      # (API_NOTES.md), so the rotated tokens MUST replace the secrets or
      # the next run starts from a dead credential. Runs even when the
      # suite fails — a partial run may already have rotated.
      - name: persist rotated refresh tokens
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo '::error::GH_SECRETS_PAT missing — rotated tokens cannot be persisted; next run WILL fail'
            exit 1
          fi
          # Parse, never source — the values are data, not shell. Guard
          # against an empty/partial value overwriting a still-valid
          # secret (the old refresh token stays valid until its
          # successor is exchanged, so keeping it is safe).
          rt=$(grep '^REFRESH_TOKEN=' /tmp/ynab_oauth_rotated | cut -d= -f2-)
          rot=$(grep '^RO_REFRESH_TOKEN=' /tmp/ynab_oauth_rotated | cut -d= -f2-)
          echo "::add-mask::$rt"
          echo "::add-mask::$rot"
          if [ -z "$rt" ] || [ -z "$rot" ]; then
            echo '::error::rotated token empty — keeping the existing secret'; exit 1
          fi
          gh secret set YNAB_OAUTH_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body "$rt"
          gh secret set YNAB_OAUTH_RO_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body "$rot"
